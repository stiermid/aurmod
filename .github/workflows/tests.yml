name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: uv sync

      - name: Run tests
        run: uv run pytest -v

      - name: Lint
        uses: uv run ruff check
